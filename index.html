<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BREVORA Coffee Shop - Registration</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url("coffee.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.container{
    width:90%;
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

.logo{
    width:120px;
    display:block;
    margin:auto;
}

h1{
    text-align:center;
    color:#6F4E37;
    margin-top:15px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

fieldset{
    border:2px solid #6F4E37;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
}

legend{
    font-size:20px;
    color:#6F4E37;
    font-weight:bold;
    padding:0 10px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:15px;
}

.column{
    flex:1;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

input[type=text],
input[type=email],
input[type=password],
input[type=tel],
input[type=date],
select,
textarea{
    width:100%;
    padding:10px;
    border:1px solid #bbb;
    border-radius:6px;
    font-size:15px;
}

textarea{
    resize:none;
}

.radio-group,
.checkbox-group{
    margin-top:10px;
}

.radio-group label,
.checkbox-group label{
    display:inline;
    font-weight:normal;
    margin-right:20px;
}

input[type=radio],
input[type=checkbox]{
    width:auto;
    margin-right:5px;
}

.buttons{
    display:flex;
    gap:15px;
}

button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

.reset{
    background:#999;
    color:white;
}

.reset:hover{
    background:#666;
}

.submit{
    background:#6F4E37;
    color:white;
}

.submit:hover{
    background:#4E342E;
}

.home{
    display:block;
    width:200px;
    margin:25px auto 0;
    text-align:center;
    background:#6F4E37;
    color:white;
    padding:12px;
    border-radius:30px;
    text-decoration:none;
}

.home:hover{
    background:#4E342E;
}

@media(max-width:700px){

.row{
    flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<img src="img\logo.png" class="logo" alt="BREVORA Logo">

<h1>BREVORA Coffee Shop</h1>

<p>Create your customer account and enjoy premium coffee rewards.</p>

<form>

<fieldset>

<legend>Personal Information</legend>

<div class="row">

<div class="column">
<label>First Name</label>
<input type="text" placeholder="Enter first name" required>
</div>

<div class="column">
<label>Last Name</label>
<input type="text" placeholder="Enter last name" required>
</div>

</div>

<div class="row">

<div class="column">
<label>Email</label>
<input type="email" placeholder="example@gmail.com" required>
</div>

<div class="column">
<label>Phone Number</label>
<input type="tel" placeholder="+94 77 123 4567" required>
</div>

</div>

<div class="row">

<div class="column">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="column">

<label>Gender</label>

<select>
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

</div>

</div>

</fieldset>

<fieldset>

<legend>Account Details</legend>

<label>Username</label>
<input type="text" placeholder="Choose a username" required>

<br><br>

<label>Password</label>
<input type="password" placeholder="Create password" required>

<br><br>

<label>Confirm Password</label>
<input type="password" placeholder="Confirm password" required>

</fieldset>

<fieldset>

<legend>Address Information</legend>

<label>Street Address</label>

<textarea rows="4" placeholder="Enter your address"></textarea>

<br><br>

<div class="row">

<div class="column">

<label>City</label>

<input type="text">

</div>

<div class="column">

<label>District</label>

<input type="text">

</div>

</div>

<div class="row">

<div class="column">

<label>Postal Code</label>

<input type="text">

</div>

<div class="column">

<label>Country</label>

<select>

<option>Sri Lanka</option>

<option>India</option>

<option>Australia</option>

<option>United Kingdom</option>

</select>

</div>

</div>

</fieldset>

<fieldset>

<legend>Coffee Preferences</legend>

<label>Favourite Coffee</label>

<select>

<option>Espresso</option>

<option>Americano</option>

<option>Cappuccino</option>

<option>Latte</option>

<option>Mocha</option>

<option>Macchiato</option>

<option>Cold Brew</option>

</select>

<br><br>

<label>Milk Preference</label>

<div class="radio-group">

<input type="radio" name="milk" id="regular">
<label for="regular">Regular</label>

<input type="radio" name="milk" id="soy">
<label for="soy">Soy</label>

<input type="radio" name="milk" id="almond">
<label for="almond">Almond</label>

<input type="radio" name="milk" id="oat">
<label for="oat">Oat</label>

</div>

<br>

<label>Interested In</label>

<div class="checkbox-group">

<input type="checkbox" id="beans">
<label for="beans">Coffee Beans</label>

<input type="checkbox" id="desserts">
<label for="desserts">Desserts</label>

<input type="checkbox" id="bakery">
<label for="bakery">Bakery</label>

<input type="checkbox" id="gift">
<label for="gift">Gift Cards</label>

<input type="checkbox" id="loyalty">
<label for="loyalty">Loyalty Program</label>

</div>

</fieldset>

<fieldset>

<legend>Newsletter</legend>

<input type="checkbox" id="news">

<label for="news">
Receive promotions, discounts and coffee news by email.
</label>

</fieldset>

<fieldset>

<input type="checkbox" id="terms" required>

<label for="terms">
I agree to the Terms & Conditions and Privacy Policy.
</label>

</fieldset>

<div class="buttons">

<button type="reset" class="reset">Clear Form</button>

<button type="submit" class="submit">Create Account</button>

</div>

</form>

<a href="index.html" class="home">← Back to Home</a>

</div>

</body>
</html>
